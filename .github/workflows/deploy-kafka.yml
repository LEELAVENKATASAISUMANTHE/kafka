name: Deploy Kafka Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Remove Legacy Prisma Files On Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            mkdir -p ~/kafka-stack
            cd ~/kafka-stack

            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n rm -rf prisma prisma.config.ts Dockerfile.prisma-studio lib/prisma.js || true
              sudo -n find lib -depth -type d -empty -delete 2>/dev/null || true
            else
              chmod -R u+rwX prisma lib 2>/dev/null || true
              rm -rf prisma prisma.config.ts Dockerfile.prisma-studio lib/prisma.js 2>/dev/null || true
              find lib -depth -type d -empty -delete 2>/dev/null || true
            fi
          EOF

      - name: Copy Files To Server
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "node_modules" \
            --exclude "Dockerfile.prisma-studio" \
            --exclude "prisma.config.ts" \
            --exclude "prisma/" \
            --exclude "lib/prisma.js" \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/kafka-stack/

      - name: Deploy Containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd ~/kafka-stack

            echo "Pulling images..."
            docker compose -f docker-compose.kafka.yml pull --ignore-buildable

            echo "Starting containers..."
            docker compose -f docker-compose.kafka.yml up -d --remove-orphans

            echo "Deployment complete"
          EOF
