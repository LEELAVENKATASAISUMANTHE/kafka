name: Deploy Kafka Stack + Prisma Studio

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Files To Server
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/kafka-stack/

      - name: Deploy Containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e

            echo '🚀 Deploying Event Stack (Redpanda + Mongo + Redis + Prisma Studio)...'

            # Ensure backend networks exist
            if ! docker network inspect erp-core-net >/dev/null 2>&1; then
              echo '🌐 Creating erp-core-net...'
              docker network create erp-core-net
            fi

            if ! docker network inspect redis-core-network >/dev/null 2>&1; then
              echo '🌐 Creating redis-core-network...'
              docker network create redis-core-network
            fi

            cd ~/kafka-stack

            # Write DATABASE_URL to .env for Docker Compose interpolation
            # Uses host.docker.internal so the container can reach host PostgreSQL
            echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' > .env

            echo '📂 Files present:'
            ls -la

            echo '🐳 Pulling images defined in compose...'
            docker compose -f docker-compose.kafka.yml pull --ignore-buildable

            echo '🗄️ Pushing Database Schema Changes...'
            # Run db push inside a temporary Node 20 container securely connected to the host network
            docker run --rm -v $(pwd):/app -w /app --network host node:20 npx --yes prisma db push --accept-data-loss

            echo '🔨 Building Prisma Studio container...'
            docker compose -f docker-compose.kafka.yml build prisma-studio

            echo '🚀 Starting / Updating containers...'
            docker compose -f docker-compose.kafka.yml up -d --remove-orphans

            echo '📦 Running containers:'
            docker ps

            echo '✅ Deployment Complete'
            echo '🔗 Prisma Studio available on port 5555'
          "