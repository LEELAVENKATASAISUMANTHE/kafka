name: Deploy Kafka Stack + Prisma Studio

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Files To Server
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/kafka-stack/

      - name: Deploy Containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd ~/kafka-stack

            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env

            echo "Pulling images..."
            docker compose -f docker-compose.kafka.yml pull --ignore-buildable

            echo "Running Prisma migration..."
            docker run --rm \
              --env-file .env \
              -v $(pwd):/app \
              -w /app \
              --network host \
              ghcr.io/prisma/prisma:latest \
              migrate deploy

            echo "Building Prisma Studio..."
            docker compose -f docker-compose.kafka.yml build prisma-studio

            echo "Starting containers..."
            docker compose -f docker-compose.kafka.yml up -d --remove-orphans

            echo "Deployment complete"
          EOF