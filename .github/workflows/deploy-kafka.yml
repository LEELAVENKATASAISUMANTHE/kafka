      - name: Deploy Containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e

            echo '🚀 Deploying Event Stack (Redpanda + Mongo + Redis + Prisma Studio)...'

            # Ensure required Docker networks exist
            docker network inspect erp-core-net >/dev/null 2>&1 || docker network create erp-core-net
            docker network inspect redis-core-network >/dev/null 2>&1 || docker network create redis-core-network

            cd ~/kafka-stack

            # Create fresh .env for Prisma
            echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' > .env

            echo '📂 Files present:'
            ls -la

            echo '🐳 Pulling images...'
            docker compose -f docker-compose.kafka.yml pull --ignore-buildable

            echo '🗄️ Running Prisma db push (Node 20 container)...'
            docker run --rm \
              --env-file .env \
              -v \$(pwd):/app \
              -w /app \
              --network host \
              node:20-alpine \
              npx -y prisma db push

            echo '🔨 Building Prisma Studio...'
            docker compose -f docker-compose.kafka.yml build prisma-studio

            echo '🚀 Starting / Updating containers...'
            docker compose -f docker-compose.kafka.yml up -d --remove-orphans

            echo '📦 Running containers:'
            docker ps

            echo '✅ Deployment Complete'
            echo '🔗 Prisma Studio available on port 5555'
          "