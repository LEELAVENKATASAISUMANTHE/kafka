name: Scheduled SQL Cron Jobs

on:
  # ──────────────────────────────────────────────
  # Cron schedule (UTC). Runs every day at 19:00 UTC = 12:30 AM IST (next day)
  # Adjust the schedule below as needed.
  # ──────────────────────────────────────────────
  schedule:
    - cron: "0 19 * * *"   # Every day at 7 PM UTC (12:30 AM IST)

  # Allow manual trigger from the Actions tab with options
  workflow_dispatch:
    inputs:
      sql_file:
        description: "SQL file to execute"
        required: true
        default: "scripts/cron_jobs.sql"
        type: choice
        options:
          - scripts/cron_jobs.sql
      custom_sql:
        description: "Custom SQL command to run (leave empty to use the file above)"
        required: false
        type: string
        default: ""

jobs:
  run-sql-maintenance:
    name: Run Scheduled SQL Maintenance
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repo so we have access to the SQL file ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup database connection ──
      - name: Setup DB Connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🕐 Starting scheduled SQL maintenance..."
          echo "⏰ Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          # Parse DATABASE_URL into psql connection parameters
          # Expected format: postgresql://user:pass@host:port/dbname?params
          echo "PGPASSWORD=$(echo "$DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')" >> $GITHUB_ENV
          echo "PGUSER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')" >> $GITHUB_ENV
          echo "PGHOST=$(echo "$DATABASE_URL" | sed -n 's|.*@\([^:]*\):.*|\1|p')" >> $GITHUB_ENV
          echo "PGPORT=$(echo "$DATABASE_URL" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')" >> $GITHUB_ENV
          echo "PGDB=$(echo "$DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')" >> $GITHUB_ENV

      # ── 3. Run SQL file (default for scheduled runs, or chosen file for manual) ──
      - name: Execute SQL File
        if: ${{ github.event.inputs.custom_sql == '' || github.event_name == 'schedule' }}
        env:
          SQL_FILE: ${{ github.event.inputs.sql_file || 'scripts/cron_jobs.sql' }}
        run: |
          echo "📄 Running SQL file: ${SQL_FILE}"
          echo "📡 Connecting to: ${PGHOST}:${PGPORT}/${PGDB} as ${PGUSER}"
          echo ""

          psql -h "$PGHOST" \
               -p "$PGPORT" \
               -U "$PGUSER" \
               -d "$PGDB" \
               -v ON_ERROR_STOP=1 \
               -f "$SQL_FILE"

          echo ""
          echo "✅ SQL file executed successfully!"

      # ── 4. Run custom SQL command (only for manual trigger with custom input) ──
      - name: Execute Custom SQL
        if: ${{ github.event.inputs.custom_sql != '' && github.event_name != 'schedule' }}
        run: |
          echo "⚡ Running custom SQL command..."
          echo "📡 Connecting to: ${PGHOST}:${PGPORT}/${PGDB} as ${PGUSER}"
          echo ""
          echo "SQL: ${{ github.event.inputs.custom_sql }}"
          echo ""

          psql -h "$PGHOST" \
               -p "$PGPORT" \
               -U "$PGUSER" \
               -d "$PGDB" \
               -v ON_ERROR_STOP=1 \
               -c "${{ github.event.inputs.custom_sql }}"

          echo ""
          echo "✅ Custom SQL executed successfully!"

      # ── 3. Notify on failure (optional — logs are always visible in Actions) ──
      - name: Report Failure
        if: failure()
        run: |
          echo "❌ SQL Cron job FAILED at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Check the logs above for error details."
          exit 1
