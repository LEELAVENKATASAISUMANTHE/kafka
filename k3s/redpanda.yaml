apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: infra
  labels:
    app: redpanda
spec:
  type: ClusterIP
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: schema-registry
      port: 8081
      targetPort: 8081
    - name: admin
      port: 9644
      targetPort: 9644
    - name: pandaproxy
      port: 8082
      targetPort: 8082
    - name: rpc
      port: 33145
      targetPort: 33145
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: infra
  labels:
    app: redpanda
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.3.15
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/rpk
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - "400M"        # what redpanda allocates internally
            - --reserve-memory
            - "0M"
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - "PLAINTEXT://0.0.0.0:9092"
            - --advertise-kafka-addr
            - "PLAINTEXT://redpanda.infra.svc.cluster.local:9092"
            - --pandaproxy-addr
            - "0.0.0.0:8082"
            - --advertise-pandaproxy-addr
            - "http://redpanda.infra.svc.cluster.local:8082"
            - --schema-registry-addr
            - "0.0.0.0:8081"
            - --rpc-addr
            - "0.0.0.0:33145"
            - --advertise-rpc-addr
            - "redpanda.infra.svc.cluster.local:33145"
            - --set
            - "redpanda.enable_idempotence=true"
            - --set
            - "redpanda.auto_create_topics_enabled=true"
          ports:
            - name: kafka
              containerPort: 9092
            - name: schema-registry
              containerPort: 8081
            - name: admin
              containerPort: 9644
            - name: pandaproxy
              containerPort: 8082
            - name: rpc
              containerPort: 33145
          resources:
            requests:
              cpu: "250m"
              memory: "400Mi"
            limits:
              cpu: "500m"
              memory: "600Mi"  # always higher than --memory flag
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi