apiVersion: v1
kind: Secret
metadata:
  name: infra-secrets
  namespace: infra
type: Opaque
stringData:
  MONGO_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  R2_ACCOUNT_ID: "REPLACE_ME"
  R2_ACCESS_KEY_ID: "REPLACE_ME"
  R2_SECRET_ACCESS_KEY: "REPLACE_ME"
  R2_BUCKET: "infra-backups"
